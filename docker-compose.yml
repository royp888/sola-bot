services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SOLA_DATABASE_NAME:-sola}
      POSTGRES_USER: ${SOLA_DATABASE_USER:-sola}
      POSTGRES_PASSWORD: ${SOLA_DATABASE_PASSWORD:-sola}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${SOLA_ENV_FILE:-.env}
    environment:
      DATABASE_URL: "${SOLA_DATABASE_DSN:-postgres://sola:sola@postgres:5432/sola?sslmode=disable}"
    volumes:
      - ./database/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS schema_migrations (version TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW());"
        for file in /migrations/*.up.sql; do
          version="$(basename "$file" | cut -d_ -f1)"
          if psql "$DATABASE_URL" -tAc "SELECT 1 FROM schema_migrations WHERE version = '$version'" | grep -q 1; then
            echo "Skipping migration $version"
            continue
          fi
          echo "Applying migration $version from $file"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO schema_migrations (version) VALUES ('$version')"
        done

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${SOLA_ENV_FILE:-.env}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  api-direct:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    profiles:
      - debug
      - direct-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${SOLA_ENV_FILE:-.env}
    ports:
      - "${SOLA_API_HOST:-127.0.0.1}:${SOLA_API_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${SOLA_ENV_FILE:-.env}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/exe"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${SOLA_ENV_FILE:-.env}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/exe"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${SOLA_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  redis_data:
